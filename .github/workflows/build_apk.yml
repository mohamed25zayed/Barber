name: Build All Platforms
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android@latest

      - name: Fix Android Resource Files
        run: |
          # إضافة القيمة الناقصة لملف strings.xml برمجياً لحل مشكلة Build Failure
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i '/<\/resources>/i \    <string name="title_activity_main">MainActivity<\/string>' $STRINGS_FILE
          fi

      - name: Sync Android
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap config set appId "com.barberhome.app"
          npx cap config set appName "BarberHome"
          npx cap sync android

      - name: Build Android (APK & AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleRelease

      - name: Upload Android Files
        uses: actions/upload-artifact@v4
        with:
          name: Android-Package
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/ios@latest
      
      - name: Build iOS Project
        run: |
          chmod +x ./node_modules/.bin/cap
          # تهيئة ملف capacitor.config.json للسيرفر
          echo '{"appId": "com.barberhome.app", "appName": "BarberHome", "webDir": "www"}' > capacitor.config.json
          npx cap add ios || true
          npx cap sync ios