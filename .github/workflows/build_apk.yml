name: Build All Platforms
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      # استخدام أمر sync بدلاً من copy لضمان إنشاء ملفات الـ Plugins
      - name: Sync Web Assets & Plugins
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap sync android

      - name: Build Android (APK & AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleRelease

      - name: Upload Android Files
        uses: actions/upload-artifact@v4
        with:
          name: Android-Package
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install
      
      - name: Build iOS Project
        run: |
          chmod +x ./node_modules/.bin/cap
          npx cap add ios || true  # لو المنصة موجودة هيكمل عادي
          npx cap sync ios         # مزامنة وتحديث ملفات الأيفون